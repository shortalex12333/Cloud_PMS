<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamburger Menu — Celeste Design Prototype</title>
<link rel="stylesheet" href="prototype-tokens.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans); background: var(--bg); color: var(--txt);
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  font-size: 13px; -webkit-font-smoothing: antialiased;
}

/* ─── Simulated app shell ─── */
.topbar {
  height: 40px; flex-shrink: 0; display: flex; align-items: center;
  padding: 0 20px; gap: 8px;
  border-bottom: 1px solid var(--border-subtle);
  background: rgba(12,11,10,0.70);
  backdrop-filter: blur(12px);
}
.topbar-brand { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: #4A9EC0; }
.topbar-sep { width: 1px; height: 12px; background: var(--border); margin: 0 4px; }
.topbar-vessel { font-size: 11px; color: var(--txt-tertiary); }
.topbar-spacer { flex: 1; }
.topbar-role { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--txt-ghost); background: var(--surface-elevated); border: 1px solid var(--border); border-radius: 3px; padding: 2px 7px; }

.stage { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 10vh; }

/* Search panel stub */
.search-stub {
  width: 100%; max-width: 600px; padding: 0 20px;
}
.search-box {
  background: var(--surface-card);
  border-top: 1px solid var(--border-top); border-right: 1px solid var(--border-side);
  border-bottom: 1px solid var(--border-bottom); border-left: 1px solid var(--border-side);
  border-radius: 8px; overflow: hidden;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.60), 0 28px 80px rgba(0,0,0,0.80);
}
.search-input {
  display: flex; align-items: center; gap: 8px; padding: 14px 16px;
  border-bottom: 1px solid var(--border-subtle);
}
.search-input svg { width: 16px; height: 16px; color: var(--txt-ghost); flex-shrink: 0; }
.search-input span { font-size: 14px; color: var(--txt-ghost); }

/* Icon strip */
.icon-strip {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; padding: 8px 16px;
}
.icon-btn {
  width: 32px; height: 32px; border-radius: 4px; border: none;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--txt-ghost); transition: background 100ms, color 100ms;
  position: relative;
}
.icon-btn:hover { background: var(--surface-hover); color: var(--txt-secondary); }
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn.active { color: var(--mark); background: var(--surface-hover); }

/* ═══════════════════════════════════════════════════════
   COMMAND PALETTE — Settings-style overlay.
   Full backdrop blur + centered card with sidebar nav.
   ═══════════════════════════════════════════════════════ */
.cmd-overlay {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 180ms ease;
}
.cmd-overlay.open { opacity: 1; pointer-events: auto; }
.cmd-bg {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.50);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}

.cmd-card {
  position: relative;
  width: 420px; max-height: 480px;
  background: var(--surface-elevated);
  border-top: 1px solid rgba(255,255,255,0.10);
  border-right: 1px solid rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.03);
  border-left: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.50), 0 32px 100px rgba(0,0,0,0.70);
  overflow: hidden;
  display: flex; flex-direction: column;
  transform: scale(0.97) translateY(8px);
  transition: transform 200ms cubic-bezier(0.16,1,0.3,1);
}
.cmd-overlay.open .cmd-card { transform: scale(1) translateY(0); }

/* Header */
.cmd-hdr {
  display: flex; align-items: center; padding: 14px 16px;
  border-bottom: 1px solid var(--border-subtle);
  gap: 8px; flex-shrink: 0;
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(8px);
}
.cmd-hdr-icon {
  width: 24px; height: 24px; border-radius: 5px;
  background: var(--teal-bg); display: flex;
  align-items: center; justify-content: center;
}
.cmd-hdr-icon svg { width: 12px; height: 12px; color: var(--mark); }
.cmd-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--txt-secondary); flex: 1; }
.cmd-close {
  width: 28px; height: 28px; border-radius: 6px; border: none;
  background: none; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  color: var(--txt-ghost); transition: background 60ms;
}
.cmd-close:hover { background: var(--surface-hover); color: var(--txt-secondary); }

/* Section label */
.cmd-sect {
  font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--txt-ghost);
  padding: 12px 16px 4px;
}

/* Menu items */
.cmd-body { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }

.cmd-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 6px;
  cursor: pointer; transition: background 60ms;
  min-height: 44px;
  border: none; background: none; width: 100%; text-align: left;
  font-family: var(--font-sans);
}
.cmd-item:hover { background: var(--surface-hover); }
.cmd-item-icon {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cmd-item-icon svg { width: 14px; height: 14px; }
.cmd-item-icon.teal { background: var(--teal-bg); color: var(--mark); }
.cmd-item-icon.neutral { background: rgba(255,255,255,0.06); color: var(--txt-tertiary); }
.cmd-item-icon.amber { background: var(--amber-bg); color: var(--amber); }
.cmd-item-icon.green { background: var(--green-bg); color: var(--green); }

.cmd-item-text { flex: 1; }
.cmd-item-name { font-size: 13px; font-weight: 500; color: var(--txt); }
.cmd-item-desc { font-size: 11px; color: var(--txt-tertiary); margin-top: 1px; }
.cmd-item-badge {
  font-size: 10px; font-weight: 600; font-family: var(--font-mono);
  padding: 1px 6px; border-radius: 4px;
  background: var(--teal-bg); color: var(--mark);
}
.cmd-item-chevron { width: 12px; height: 12px; color: var(--txt-ghost); flex-shrink: 0; }

/* Separator */
.cmd-sep { height: 1px; background: var(--border-subtle); margin: 4px 12px; }

/* Keyboard hint footer */
.cmd-footer {
  display: flex; align-items: center; gap: 4px;
  padding: 8px 16px; border-top: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.cmd-hint { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--txt-ghost); }
.cmd-hint kbd {
  background: var(--surface-elevated); border-radius: 3px;
  padding: 1px 5px; font-size: 10px; color: var(--txt-tertiary);
  font-family: var(--font-mono); min-width: 18px; text-align: center;
  border: 1px solid var(--border-subtle);
}
.cmd-hint-sep { width: 1px; height: 10px; background: var(--border-subtle); margin: 0 8px; }

/* Light mode */
[data-theme="light"] .cmd-bg { background: rgba(0,0,0,0.25); }
[data-theme="light"] .cmd-card {
  box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 24px 64px rgba(0,0,0,0.15);
  border-color: rgba(0,0,0,0.08);
}
[data-theme="light"] .cmd-item:hover { background: rgba(0,0,0,0.04); }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <span class="topbar-brand">Celeste</span>
  <span class="topbar-sep"></span>
  <span class="topbar-vessel">SY M/Y Test Vessel</span>
  <div class="topbar-spacer"></div>
  <span class="topbar-role">Captain</span>
</div>

<!-- Stage with search -->
<div class="stage">
  <div class="search-stub">
    <div class="search-box">
      <div class="search-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Find fault 1234</span>
      </div>
      <div class="icon-strip">
        <button class="icon-btn" title="Email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
        </button>
        <button class="icon-btn active" onclick="toggleMenu()" title="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <button class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     COMMAND PALETTE — replaces bland Radix dropdown
     ═══════════════════════════════════════════════════════ -->
<div class="cmd-overlay" id="menu" onclick="if(event.target===this||event.target.classList.contains('cmd-bg'))toggleMenu()">
  <div class="cmd-bg"></div>
  <div class="cmd-card">

    <div class="cmd-hdr">
      <div class="cmd-hdr-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </div>
      <span class="cmd-title">Quick Actions</span>
      <button class="cmd-close" onclick="toggleMenu()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="cmd-body">

      <div class="cmd-sect">Actions</div>

      <div class="cmd-item" onclick="toggleMenu()">
        <div class="cmd-item-icon teal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div class="cmd-item-text">
          <div class="cmd-item-name">Handover Draft</div>
          <div class="cmd-item-desc">Review and export your handover notes</div>
        </div>
        <span class="cmd-item-badge">3</span>
        <svg class="cmd-item-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>

      <div class="cmd-item" onclick="toggleMenu()">
        <div class="cmd-item-icon green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 00-8 0v2"/><path d="M12 14v2"/></svg>
        </div>
        <div class="cmd-item-text">
          <div class="cmd-item-name">Log Receiving</div>
          <div class="cmd-item-desc">Scan or upload delivery documents</div>
        </div>
        <svg class="cmd-item-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>

      <div class="cmd-sep"></div>

      <div class="cmd-sect">Views</div>

      <div class="cmd-item" onclick="toggleMenu()">
        <div class="cmd-item-icon amber">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        </div>
        <div class="cmd-item-text">
          <div class="cmd-item-name">Ledger</div>
          <div class="cmd-item-desc">Activity timeline — yours and your department</div>
        </div>
        <svg class="cmd-item-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>

      <div class="cmd-item" onclick="toggleMenu()">
        <div class="cmd-item-icon neutral">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
        </div>
        <div class="cmd-item-text">
          <div class="cmd-item-name">Email</div>
          <div class="cmd-item-desc">Linked vessel correspondence</div>
        </div>
        <svg class="cmd-item-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>

    </div>

    <div class="cmd-footer">
      <div class="cmd-hint"><kbd>↑</kbd><kbd>↓</kbd> Navigate</div>
      <div class="cmd-hint-sep"></div>
      <div class="cmd-hint"><kbd>↵</kbd> Open</div>
      <div class="cmd-hint-sep"></div>
      <div class="cmd-hint"><kbd>Esc</kbd> Close</div>
    </div>

  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById('menu').classList.toggle('open');
}
setTimeout(function() { toggleMenu(); }, 400);
</script>
</body>
</html>
