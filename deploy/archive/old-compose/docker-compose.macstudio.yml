# =============================================================================
# CELESTE FULL STACK - Mac Studio Local Development (96GB RAM)
# =============================================================================
#
# PURPOSE: Full observability local development environment
# MACHINE: 96GB Mac Studio - allocate generously for debugging headroom
#
# OBSERVABILITY: Claude can inspect everything:
#   - docker stats              → Memory, CPU, Network I/O
#   - docker logs -f <service>  → Real-time logs, errors, stack traces
#   - docker exec -it <s> bash  → Get inside container, inspect files
#   - docker inspect <service>  → Full state, health, exit codes
#
# USAGE:
#   Start:   docker-compose -f docker-compose.macstudio.yml up --build -d
#   Logs:    docker-compose -f docker-compose.macstudio.yml logs -f
#   Stats:   docker stats
#   Stop:    docker-compose -f docker-compose.macstudio.yml down
#   Reset:   docker-compose -f docker-compose.macstudio.yml down -v
#
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # LOCAL INFRASTRUCTURE (Replaces Supabase + Redis Labs = ~$80-150/month saved)
  # ===========================================================================

  postgres:
    image: postgres:15-alpine
    container_name: celeste-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: celeste
    ports:
      - "5432:5432"
    volumes:
      - celeste-postgres-data:/var/lib/postgresql/data
      # Mount init scripts if needed:
      # - ./scripts/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: celeste-redis
    ports:
      - "6379:6379"
    volumes:
      - celeste-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ===========================================================================
  # API SERVICE (Workers 1-3: Detective, Sniper, Librarian)
  # ===========================================================================

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: celeste-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:localdev@postgres:5432/celeste
      - READ_DB_DSN=postgresql://postgres:localdev@postgres:5432/celeste
      - REDIS_URL=redis://redis:6379
      - STREAMING_ENABLED_ORGS=85fe1119-b04c-41ac-80f1-829d23322598
      - ORG_TOKENS_PER_SEC=50
      - ORG_BURST_CAPACITY=100
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      # Tenant config (for local testing)
      - yTEST_YACHT_001_SUPABASE_URL=http://postgres:5432
      - DEFAULT_YACHT_CODE=yTEST_YACHT_001
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot reload for development
      - ./apps/api:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ===========================================================================
  # WORKER 4: Projection Worker (CDC -> search_index)
  # ===========================================================================

  projection-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: celeste-projection-worker
    environment:
      - DATABASE_URL=postgresql://postgres:localdev@postgres:5432/celeste
      - F1_PROJECTION_WORKER_ENABLED=true
      - PROJECTION_BATCH_SIZE=50
      - PROJECTION_POLL_INTERVAL=5
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
    command: ["python", "workers/projection_worker.py"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ===========================================================================
  # CACHE INVALIDATION LISTENER (pg_notify -> Redis eviction)
  # ===========================================================================

  cache-listener:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: celeste-cache-listener
    environment:
      - READ_DB_DSN=postgresql://postgres:localdev@postgres:5432/celeste
      - REDIS_URL=redis://redis:6379
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
    command: ["python", "cache/invalidation_listener.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ===========================================================================
  # WORKER 5: Embedding Worker (search_index -> 1536-dim vectors)
  # ===========================================================================

  embedding-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: celeste-embedding-worker
    environment:
      - DATABASE_URL=postgresql://postgres:localdev@postgres:5432/celeste
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMBED_MODEL=text-embedding-3-small
      - EMBED_DIM=1536
      - EMBED_PROVIDER=openai
      - BATCH_SIZE=100
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
    env_file:
      - .env.local
    command: ["python", "workers/embedding_worker_1536.py"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ===========================================================================
  # NIGHTLY FEEDBACK LOOP (Manual trigger for local testing)
  # ===========================================================================

  nightly-feedback-loop:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: celeste-nightly-feedback
    environment:
      - DATABASE_URL=postgresql://postgres:localdev@postgres:5432/celeste
      - MIN_CLICKS=1
      - LOOKBACK_DAYS=30
      - BATCH_SIZE=100
      - DRY_RUN=false
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
    command: ["python", "workers/nightly_feedback_loop.py"]
    profiles:
      - manual  # Only runs when explicitly called
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ===========================================================================
  # FRONTEND (Next.js)
  # ===========================================================================

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: celeste-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=http://localhost:5432
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NODE_ENV=development
    depends_on:
      - api
    volumes:
      # Hot reload for development
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

# =============================================================================
# NAMED VOLUMES (Persist data across restarts)
# =============================================================================

volumes:
  celeste-postgres-data:
    name: celeste-postgres-data
  celeste-redis-data:
    name: celeste-redis-data

# =============================================================================
# NETWORK (Isolated from other Docker projects)
# =============================================================================

networks:
  default:
    name: celeste-local-network
