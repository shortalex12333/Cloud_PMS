services:
  # Pipeline V1 - Unified Search Service
  - type: web
    name: celeste-pipeline-v1
    runtime: python
    plan: starter
    region: oregon
    branch: main
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd apps/api && uvicorn pipeline_service:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      # MASTER DB - User auth & fleet registry
      - key: MASTER_SUPABASE_URL
        value: "https://qvzmkaamzaqxpzbewjxe.supabase.co"
      - key: MASTER_SUPABASE_SERVICE_KEY
        sync: false
      # TENANT_1 DB - PMS data for yTEST_YACHT_001
      - key: yTEST_YACHT_001_SUPABASE_URL
        value: "https://vzsohavtuotocgrfkfyd.supabase.co"
      - key: yTEST_YACHT_001_SUPABASE_SERVICE_KEY
        sync: false
      - key: yTEST_YACHT_001_SUPABASE_ANON_KEY
        sync: false
      # Default/fallback (points to TENANT_1)
      - key: SUPABASE_URL
        value: "https://vzsohavtuotocgrfkfyd.supabase.co"
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TENANT_SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Feature Flags - Shopping List Lens v1 Canary
      - key: SHOPPING_LIST_LENS_V1_ENABLED
        value: "true"

  # Email Watcher Background Worker
  - type: worker
    name: celeste-email-watcher
    runtime: python
    plan: starter
    region: oregon
    branch: main
    buildCommand: cd apps/api && pip install -r requirements.txt
    startCommand: cd apps/api && python -m workers.email_watcher_worker
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: EMAIL_WATCHER_ENABLED
        value: "true"
      - key: EMAIL_WATCHER_POLL_INTERVAL
        value: "30"
      - key: EMAIL_WATCHER_BATCH_SIZE
        value: "10"
      - key: SUPABASE_URL
        value: "https://vzsohavtuotocgrfkfyd.supabase.co"
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID_READ
        sync: false
      - key: MICROSOFT_CLIENT_SECRET_READ
        sync: false

  # NOTE: documents-health-worker and shopping-list-health-worker removed.
  # Python files don't exist yet (base class at tools/ops/monitors/base_health_monitor.py).
  # Re-add when implemented. Saves $14/month.

  # ============================================================================
  # Projection Worker - CDC -> search_index.search_text
  # ============================================================================
  # LAW 9: Only writes search_text, never touches learned_keywords or embeddings
  # Uses Supavisor pooler port 6543 for connection pooling
  #
  - type: worker
    name: celeste-projection-worker
    runtime: python
    plan: starter
    region: oregon
    branch: main
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd apps/api && python -m workers.projection_worker
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: F1_PROJECTION_WORKER_ENABLED
        value: "true"
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard - Supavisor pooler port 6543
      - key: LOG_LEVEL
        value: "INFO"

  # ============================================================================
  # Embedding Worker - search_text -> 1536-dim vectors
  # ============================================================================
  # LAW 9: Only writes embedding_1536, never touches search_text or learned_keywords
  # Circuit breaker: 5 consecutive failures -> 60s pause
  #
  - type: worker
    name: celeste-embedding-worker
    runtime: python
    plan: starter
    region: oregon
    branch: main
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd apps/api && python -m workers.embedding_worker_1536
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard - Supavisor pooler port 6543
      - key: OPENAI_API_KEY
        sync: false
      - key: EMBED_MODEL
        value: "text-embedding-3-small"
      - key: EMBED_DIMS
        value: "1536"

  # ============================================================================
  # Cache Invalidation Listener - pg_notify -> Redis eviction
  # ============================================================================
  # Listens for f1_cache_invalidate notifications and evicts stale Redis keys
  # Uses direct port 5432 (not pooler) for LISTEN/NOTIFY support
  #
  - type: worker
    name: celeste-cache-listener
    runtime: python
    plan: starter
    region: oregon
    branch: main
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd apps/api && python -m cache.invalidation_listener
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: READ_DB_DSN
        sync: false  # Set in Render dashboard - direct port 5432
      - key: REDIS_URL
        sync: false

  # ============================================================================
  # Nightly Counterfactual Feedback Loop - Self-Healing Search
  # ============================================================================
  # LAW 8: Learns yacht-specific vocabulary from click telemetry
  # LAW 9: Updates learned_keywords without touching search_text
  #
  # This cron job aggregates search clicks and teaches the search engine
  # each yacht's unique dialect. If Yacht A's crew searches "watermaker"
  # and clicks "Desalinator Unit 1" repeatedly, the system learns that
  # association FOR THAT YACHT ONLY.
  #
  - type: cron
    name: nightly-feedback-loop
    runtime: python
    plan: starter
    region: oregon
    branch: main
    schedule: "0 3 * * *"  # 3:00 AM UTC daily
    buildCommand: cd apps/api && pip install psycopg2-binary
    startCommand: cd apps/api && python -m workers.nightly_feedback_loop
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      # DATABASE_URL uses Supavisor pooler port 6543 for connection pooling
      # Format: postgresql://postgres.{project_ref}:{password}@aws-0-us-west-1.pooler.supabase.com:6543/postgres
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard - contains credentials
      # Feedback loop configuration
      - key: MIN_CLICKS
        value: "3"
      - key: LOOKBACK_DAYS
        value: "30"
      - key: BATCH_SIZE
        value: "100"
      - key: LOG_LEVEL
        value: "INFO"
