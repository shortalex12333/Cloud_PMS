version: '3.8'

# =============================================================================
# Celeste Local Stack — Canonical Orchestration File
# =============================================================================
# Replaces: docker-compose.f1-workers.yml (workers-only, now retired)
# Replaces: Render.yaml services (celeste-pipeline-v1, celeste-email-watcher,
#           nightly-feedback-loop)
#
# Profiles:
#   full     -> api + all workers (default for local dev)
#   api      -> API only
#   workers  -> workers only (no API)
#   web      -> Next.js frontend only (port 3000; conflicts with Kenoki if running)
#   cron     -> nightly-feedback-loop (one-shot, run with: docker compose run)
#
# Usage:
#   docker compose --profile full up --build       # Start everything
#   docker compose --profile workers up            # Workers only
#   docker compose --profile api up                # API only
#   docker compose --profile web up                # Frontend only
#   docker compose --profile cron run --rm nightly-feedback-loop  # One-shot
#
# Secrets: Copy env.example -> .env and fill in values (never commit .env)
# Logs: docker compose logs -f projection-worker embedding-worker
#
# Nightly cron: scheduled via macOS launchd
#   ~/Library/LaunchAgents/com.celeste.nightly-feedback.plist
#   Runs at 3 AM: docker compose --profile cron run --rm nightly-feedback-loop
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ==========================================================================
  # API -- FastAPI pipeline service
  # Replaces Render service: celeste-pipeline-v1
  # DATABASE_URL explicitly set to READ_DB_DSN (port 5432, direct connection)
  # to override the pooler value in .env (port 6543). Workers use pooler.
  # ==========================================================================
  api:
    profiles: ["api", "full"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - READ_DB_DSN=${READ_DB_DSN}
      - DATABASE_URL=${READ_DB_DSN}
      - REDIS_URL=${REDIS_URL}
      - STREAMING_ENABLED_ORGS=85fe1119-b04c-41ac-80f1-829d23322598
      - ORG_TOKENS_PER_SEC=50
      - ORG_BURST_CAPACITY=100
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - yTEST_YACHT_001_SUPABASE_URL=https://vzsohavtuotocgrfkfyd.supabase.co
      - yTEST_YACHT_001_SUPABASE_SERVICE_KEY=${yTEST_YACHT_001_SUPABASE_SERVICE_KEY}
      - DEFAULT_YACHT_CODE=yTEST_YACHT_001
      - MASTER_SUPABASE_JWT_SECRET=${MASTER_SUPABASE_JWT_SECRET}
      - AZURE_READ_APP_ID=41f6dc82-8127-4330-97e0-c6b26e6aa967
      - AZURE_READ_CLIENT_SECRET=${AZURE_READ_CLIENT_SECRET}
      - AZURE_WRITE_APP_ID=f0b8944b-8127-4f0f-8ed5-5487462df50c
      - AZURE_WRITE_CLIENT_SECRET=${AZURE_WRITE_CLIENT_SECRET}
    command: ["sh", "-c", "uvicorn pipeline_service:app --host 0.0.0.0 --port 8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==========================================================================
  # Web -- Next.js frontend
  # Note: port 3000 conflicts with Kenoki if it is running locally
  # ==========================================================================
  web:
    profiles: ["web"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=https://vzsohavtuotocgrfkfyd.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_FRAGMENTED_ROUTES_ENABLED=true
    depends_on:
      - api
    logging: *default-logging

  # ==========================================================================
  # Cache Invalidation Listener (pg_notify -> Redis eviction)
  # ==========================================================================
  cache-listener:
    profiles: ["workers", "full"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      - READ_DB_DSN=${READ_DB_DSN}
      - REDIS_URL=${REDIS_URL}
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    command: ["python", "cache/invalidation_listener.py"]
    restart: on-failure
    healthcheck:
      disable: true
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ==========================================================================
  # Projection Worker (CDC -> search_index.search_text)
  # LAW 9: Only writes search_text, never touches learned_keywords
  # sys.path fix already in source -- CMD must stay as python workers/...
  # ==========================================================================
  projection-worker:
    profiles: ["workers", "full"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - F1_PROJECTION_WORKER_ENABLED=true
      - PROJECTION_BATCH_SIZE=50
      - PROJECTION_POLL_INTERVAL=5
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    command: ["python", "workers/projection_worker.py"]
    restart: on-failure
    healthcheck:
      disable: true
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==========================================================================
  # Embedding Worker (search_text -> 1536-dim vectors)
  # LAW 9: Only writes embedding_1536, never touches search_text or learned_keywords
  # Circuit breaker: 5 consecutive failures -> 60s pause
  # ==========================================================================
  embedding-worker:
    profiles: ["workers", "full"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMBED_MODEL=text-embedding-3-small
      - EMBED_DIM=1536
      - EMBED_PROVIDER=openai
      - BATCH_SIZE=100
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    command: ["python", "workers/embedding_worker_1536.py"]
    restart: on-failure
    healthcheck:
      disable: true
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==========================================================================
  # Email Watcher (Microsoft Exchange -> search_index)
  # Replaces Render service: celeste-email-watcher
  # Polls every 30s (code default; render.yaml incorrectly documented 60s)
  # EMAIL_WATCHER_ENABLED must be set inline -- env var gate checked at startup
  # ==========================================================================
  email-watcher:
    profiles: ["workers", "full"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      - EMAIL_WATCHER_ENABLED=true
      - EMAIL_WATCHER_POLL_INTERVAL=30
      - EMAIL_WATCHER_BATCH_SIZE=10
      - SUPABASE_URL=https://vzsohavtuotocgrfkfyd.supabase.co
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - MICROSOFT_CLIENT_ID_READ=${MICROSOFT_CLIENT_ID_READ}
      - MICROSOFT_CLIENT_SECRET_READ=${MICROSOFT_CLIENT_SECRET_READ}
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    command: ["python", "workers/email_watcher_worker.py"]
    restart: on-failure
    healthcheck:
      disable: true
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==========================================================================
  # Nightly Feedback Loop (click telemetry -> learned_keywords)
  # Replaces Render cron: nightly-feedback-loop (schedule: "0 3 * * *")
  # LAW 8: Tenant-isolated -- never crosses yacht boundaries
  # LAW 9: Only writes learned_keywords, never touches search_text
  #
  # One-shot script (runs and exits). Do NOT use `up` for this service.
  # Usage: docker compose --profile cron run --rm nightly-feedback-loop
  # Scheduling: ~/Library/LaunchAgents/com.celeste.nightly-feedback.plist
  # ==========================================================================
  nightly-feedback-loop:
    profiles: ["cron"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MIN_CLICKS=1
      - LOOKBACK_DAYS=30
      - BATCH_SIZE=100
      - DRY_RUN=false
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
    command: ["python", "workers/nightly_feedback_loop.py"]
    healthcheck:
      disable: true
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
