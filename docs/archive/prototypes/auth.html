<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celeste PMS · Sign In</title>
<link rel="stylesheet" href="prototype-tokens.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--txt-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ─── BACKDROP ─── */
.backdrop {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
  background: var(--bg);
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(90px); opacity: 0.5;
}
.orb-1 { width: 60vw; height: 60vw; top: -20vw; left: -8vw;
  background: radial-gradient(circle, rgba(58,124,157,0.50) 0%, transparent 70%); }
.orb-2 { width: 45vw; height: 45vw; bottom: -12vw; right: -5vw;
  background: radial-gradient(circle, rgba(30,90,130,0.38) 0%, transparent 70%); }
[data-theme="light"] .orb { opacity: 0.20; }

/* ─── APP SHELL ─── */
.app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; }

/* ─── TOP BAR ─── */
.topbar {
  height: 40px; flex-shrink: 0;
  display: flex; align-items: center; padding: 0 20px; gap: 8px;
  border-bottom: 1px solid var(--border-subtle);
  background: rgba(12,11,10,0.70);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
[data-theme="light"] .topbar { background: rgba(245,245,245,0.85); }
.topbar-brand { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--mark); }
.topbar-spacer { flex: 1; }
.topbar-theme {
  width: 28px; height: 28px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; background: none; border: none;
  color: var(--txt-ghost); transition: background 80ms;
}
.topbar-theme:hover { background: var(--surface-hover); color: var(--txt-secondary); }
.icon-sun  { display: none; }
[data-theme="light"] .icon-moon { display: none; }
[data-theme="light"] .icon-sun  { display: block; }

/* ─── STAGE ─── */
.stage {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* ─── AUTH CARD ─── */
.auth-card {
  width: 100%; max-width: 384px;
  background: var(--surface-primary);
  border-top:    1px solid var(--border-top);
  border-right:  1px solid var(--border);
  border-bottom: 1px solid var(--border-subtle);
  border-left:   1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.60), 0 4px 20px rgba(0,0,0,0.40),
              inset 0 1px 0 rgba(255,255,255,0.05);
  padding: 0;
  overflow: hidden;
}
[data-theme="light"] .auth-card {
  box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 20px 60px rgba(0,0,0,0.10);
}

/* ─── CARD HEADER ─── */
.auth-header {
  padding: 32px 32px 0;
  text-align: center;
}
.auth-logo {
  font-size: 9px; font-weight: 600; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--mark);
  margin-bottom: 4px;
}
.auth-title {
  font-size: 20px; font-weight: 600; color: var(--txt-primary);
  margin-bottom: 4px;
}
.auth-subtitle {
  font-size: 13px; color: var(--txt-ghost);
}

/* ─── FORM ─── */
.auth-form {
  padding: 24px 32px 32px;
}
.field {
  margin-bottom: 16px;
}
.field-label {
  display: block;
  font-size: 11px; font-weight: 500; letter-spacing: 0.03em;
  text-transform: uppercase;
  color: var(--txt-tertiary);
  margin-bottom: 6px;
}
.field-input {
  width: 100%; height: 44px;
  padding: 0 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--txt-primary);
  outline: none;
  transition: border-color 120ms;
}
.field-input::placeholder { color: var(--txt-ghost); }
.field-input:focus { border-color: var(--teal); }
[data-theme="light"] .field-input { background: #F5F5F5; }

/* ─── PASSWORD ROW ─── */
.field-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.field-forgot {
  font-size: 10px; color: var(--mark);
  cursor: pointer; text-decoration: none;
  transition: opacity 80ms;
}
.field-forgot:hover { opacity: 0.80; }

/* ─── ERROR STATE ─── */
.field-error {
  font-size: 11px; color: var(--red);
  margin-top: 4px; display: none;
}
.field-input.error { border-color: var(--red); }

/* ─── SUBMIT BUTTON ─── */
.auth-btn {
  width: 100%; height: 44px;
  border-radius: 6px;
  border: none; cursor: pointer;
  font-family: var(--font-sans);
  font-size: 13px; font-weight: 500;
  background: var(--teal-bg);
  color: var(--mark);
  transition: background 80ms;
  margin-top: 4px;
}
.auth-btn:hover {
  background: rgba(58,124,157,0.18);
}
.auth-btn:active {
  background: rgba(58,124,157,0.24);
}

/* ─── DIVIDER ─── */
.auth-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 22px 0;
}
.auth-divider-line {
  flex: 1; height: 1px;
  background: var(--border);
}
.auth-divider-text {
  font-size: 9px; color: var(--txt-ghost);
  text-transform: uppercase; letter-spacing: 0.08em;
}

/* ─── SWITCH LINK ─── */
.auth-switch {
  text-align: center;
  font-size: 13px; color: var(--txt-ghost);
}
.auth-switch a {
  color: var(--mark); cursor: pointer;
  text-decoration: none; font-weight: 500;
}
.auth-switch a:hover { text-decoration: underline; }

/* ─── FOOTER ─── */
.auth-footer {
  padding: 0 32px 28px;
}

/* ─── STATE TOGGLE ─── */
.state-signin  { display: block; }
.state-signup  { display: none; }
.state-signup.visible { display: block; }
.state-signin.hidden  { display: none; }

/* ─── VERSION STAMP ─── */
.version {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 10px; font-family: var(--font-mono);
  color: var(--txt-ghost); letter-spacing: 0.04em;
}

/* ─── DEMO CONTROLS ─── */
.demo-controls {
  position: fixed; bottom: 16px; right: 20px; z-index: 200;
  display: flex; gap: 6px;
}
.demo-btn {
  height: 28px; padding: 0 12px;
  border-radius: 3px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--surface-elevated); color: var(--txt-secondary);
  font-family: var(--font-sans); transition: background 100ms;
}
.demo-btn:hover { background: var(--surface-hover); color: var(--txt-primary); }
.demo-btn.active { background: var(--teal); border-color: transparent; color: #fff; }

/* ─── MOBILE ─── */
@media (max-width: 480px) {
  .auth-card { max-width: 100%; border-radius: 0; }
  .auth-header, .auth-form, .auth-footer { padding-left: 20px; padding-right: 20px; }
}
</style>
</head>
<body>

<div class="backdrop">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="app">

  <header class="topbar">
    <div class="topbar-brand">Celeste</div>
    <div class="topbar-spacer"></div>
    <button class="topbar-theme" onclick="toggleTheme()">
      <svg class="icon-moon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      <svg class="icon-sun" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </header>

  <div class="stage">

    <!-- ══ SIGN IN ══ -->
    <div class="state-signin" id="stateSignIn">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">Celeste</div>
          <h1 class="auth-title">Sign in</h1>
          <p class="auth-subtitle">Maritime management platform</p>
        </div>
        <div class="auth-form">
          <div class="field">
            <label class="field-label">Email</label>
            <input class="field-input" type="email" placeholder="you@vessel.com" autocomplete="email" />
          </div>
          <div class="field">
            <div class="field-row">
              <label class="field-label">Password</label>
              <a class="field-forgot" href="#">Forgot?</a>
            </div>
            <input class="field-input" type="password" placeholder="Enter password" autocomplete="current-password" />
          </div>
          <button class="auth-btn" type="button">Sign in</button>
          <div class="auth-divider">
            <div class="auth-divider-line"></div>
            <span class="auth-divider-text">or</span>
            <div class="auth-divider-line"></div>
          </div>
          <div class="auth-switch">
            Don't have an account? <a onclick="showSignUp()">Create one</a>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ SIGN UP ══ -->
    <div class="state-signup" id="stateSignUp">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">Celeste</div>
          <h1 class="auth-title">Create account</h1>
          <p class="auth-subtitle">Join your vessel's crew</p>
        </div>
        <div class="auth-form">
          <div class="field">
            <label class="field-label">Full Name</label>
            <input class="field-input" type="text" placeholder="First and last name" autocomplete="name" />
          </div>
          <div class="field">
            <label class="field-label">Email</label>
            <input class="field-input" type="email" placeholder="you@vessel.com" autocomplete="email" />
          </div>
          <div class="field">
            <label class="field-label">Password</label>
            <input class="field-input" type="password" placeholder="Create a password" autocomplete="new-password" />
          </div>
          <div class="field">
            <label class="field-label">Confirm Password</label>
            <input class="field-input" type="password" placeholder="Confirm password" autocomplete="new-password" />
          </div>
          <button class="auth-btn" type="button">Create account</button>
          <div class="auth-divider">
            <div class="auth-divider-line"></div>
            <span class="auth-divider-text">or</span>
            <div class="auth-divider-line"></div>
          </div>
          <div class="auth-switch">
            Already have an account? <a onclick="showSignIn()">Sign in</a>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /stage -->
</div>

<span class="version">v1.0.0</span>

<div class="demo-controls">
  <button class="demo-btn active" id="btnSignIn" onclick="showSignIn()">Sign In</button>
  <button class="demo-btn" id="btnSignUp" onclick="showSignUp()">Sign Up</button>
</div>

<script>
function showSignIn() {
  document.getElementById('stateSignIn').classList.remove('hidden');
  document.getElementById('stateSignUp').classList.remove('visible');
  document.getElementById('btnSignIn').classList.add('active');
  document.getElementById('btnSignUp').classList.remove('active');
}
function showSignUp() {
  document.getElementById('stateSignIn').classList.add('hidden');
  document.getElementById('stateSignUp').classList.add('visible');
  document.getElementById('btnSignIn').classList.remove('active');
  document.getElementById('btnSignUp').classList.add('active');
}
function toggleTheme() {
  var html = document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
</script>
</body>
</html>
